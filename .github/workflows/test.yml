name: Lua Unit Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Lua ${{ matrix.lua-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lua-version:
        - "5.1"
        - "5.2"
        - "5.3"
        - "5.4"
        - "5.5"
        - "luajit"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install Lua
      uses: leafo/gh-actions-lua@v13
      with:
        luaVersion: ${{ matrix.lua-version }}

    - name: Install LuaRocks
      uses: leafo/gh-actions-luarocks@v6

    - name: Install LuaUnit
      run: luarocks install luaunit

    - name: Run all tests
      run: |
        for file in test/*.lua; do
          if [ -f "$file" ]; then
            echo "Running $file..."
            lua "$file"
          fi
        done
