name: Lua Unit Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Lua and LuaRocks
      run: |
        sudo apt-get update
        sudo apt-get install -y lua5.1 liblua5.1-0-dev luarocks

    - name: Install LuaUnit
      run: |
        sudo luarocks --lua-version=5.1 install luaunit

    - name: Run all tests
      run: |
        for file in test/*.lua; do
          if [ -f "$file" ]; then
            echo "Running $file..."
            lua5.1 "$file"
          fi
        done
